<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title will be set dynamically -->
    <title>App Details - Karmafy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic animation (reusable) */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Scroll Animation Styles */
        .scroll-animate {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .scroll-animate.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Detail Item Styles */
        .screenshot-detail-item img {
            max-height: 500px; /* Adjust as needed */
            object-fit: contain;
            border-radius: 0.75rem; /* rounded-xl */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
             background-color: #f9fafb; /* gray-50 */
             padding: 0.5rem;
        }

    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Header & Navigation (Same as other pages) -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">Karmafy</a>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="text-gray-600 hover:text-indigo-600 font-medium">Home</a></li>
                <li><a href="about.html" class="text-gray-600 hover:text-indigo-600 font-medium">About Us</a></li>
                <li><a href="contact.html" class="text-gray-600 hover:text-indigo-600 font-medium">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto px-6 py-16">
        <!-- App name will be loaded here -->
        <h1 id="app-name" class="text-4xl font-bold text-center text-indigo-600 mb-6 animate-fadeIn">App Name</h1>
        <p id="app-tagline" class="text-xl text-center text-gray-600 mb-12 animate-fadeIn" style="animation-delay: 0.1s;">Loading details...</p>
        
        <!-- Back link -->
         <div class="mb-12 text-center animate-fadeIn" style="animation-delay: 0.2s;">
            <a href="index.html#apps" class="text-indigo-600 hover:underline">&larr; Back to All Apps</a>
        </div>

        <!-- Container for Screenshots and Descriptions -->
        <div id="screenshots-container" class="space-y-16 md:space-y-24">
            <!-- Content generated by JS -->
        </div>
        
        <!-- Placeholder while loading or if app not found -->
         <div id="loading-placeholder" class="text-center py-10 text-gray-500">
             Loading app details...
         </div>

    </main>

    <!-- Footer (Same as other pages) -->
    <footer class="bg-gray-800 text-gray-300 py-8 mt-16">
        <div class="container mx-auto px-6 text-center">
            <p>&copy; 2024 Karmafy. All rights reserved.</p>
            <p class="text-sm text-gray-500 mt-2">Specializing in Native iOS App Development</p>
        </div>
    </footer>

    <!-- JavaScript for Dynamic Loading -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const appName = params.get('app'); // e.g., 'kveo'
            const screenshotsContainer = document.getElementById('screenshots-container');
            const appNameHeading = document.getElementById('app-name');
            const appTagline = document.getElementById('app-tagline'); // Added tagline element
            const loadingPlaceholder = document.getElementById('loading-placeholder');
            const appStoreBaseUrl = 'https://apps.apple.com/app/id';

            // Function to format App Name (e.g., kveo -> KVeo)
            function formatAppName(name) {
                if (!name) return 'App';
                // Simple capitalization, can be made more sophisticated
                 return name.charAt(0).toUpperCase() + name.slice(1);
            }

            if (!appName) {
                appNameHeading.textContent = 'App Not Found';
                appTagline.textContent = 'Please select an app from the homepage.';
                loadingPlaceholder.textContent = 'No app specified in the URL.';
                screenshotsContainer.innerHTML = ''; 
                return;
            }
            
            const formattedAppName = formatAppName(appName);
            appNameHeading.textContent = formattedAppName;
            document.title = `${formattedAppName} Details - Karmafy`; // Update page title
            appTagline.textContent = `Explore the features of ${formattedAppName}`; // Set initial tagline
            loadingPlaceholder.textContent = `Loading details for ${formattedAppName}...`;

            fetch(`assets/${appName}/descriptions.json`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data) {
                         throw new Error('No data received from descriptions.json');
                    }
                    
                    // Optionally update tagline if provided in JSON
                    if(data.tagline) {
                       appTagline.textContent = data.tagline; 
                    }
                    
                    screenshotsContainer.innerHTML = ''; // Clear previous content
                    let screenshotCount = 0;

                    // Loop through expected screenshots (1.png to 6.png)
                    for (let i = 1; i <= 6; i++) {
                        const imgFilename = `${i}.png`;
                        const description = data[imgFilename]; // Get description using filename as key

                        if (description) { // Only add if description exists for this image number
                            screenshotCount++;
                            const imgPath = `assets/${appName}/${imgFilename}`;
                            
                            // Create elements
                            const itemDiv = document.createElement('div');
                            const imgDiv = document.createElement('div');
                            const textDiv = document.createElement('div');
                            const img = document.createElement('img');
                            const p = document.createElement('p');

                            // Configure image
                            img.src = imgPath;
                            img.alt = `Screenshot ${i} for ${formattedAppName}`;
                            img.classList.add('max-h-[500px]', 'object-contain', 'rounded-lg', 'shadow-lg');
                            img.loading = 'lazy'; // Lazy load images

                            // Configure paragraph
                            p.textContent = description;
                            p.classList.add('text-lg', 'text-gray-700', 'leading-relaxed');
                            
                            // Configure divs
                            imgDiv.classList.add('md:w-1/2', 'flex', 'justify-center', 'p-4');
                            imgDiv.appendChild(img);
                            
                            textDiv.classList.add('md:w-1/2', 'text-center', 'md:text-left');
                            textDiv.appendChild(p);
                            
                            // Configure main item container
                            itemDiv.classList.add('screenshot-detail-item', 'flex', 'flex-col', 'items-center', 'gap-8', 'mb-16', 'scroll-animate');
                             // Alternate layout using flex-row-reverse for even items (adjusting for 0-based count)
                            if (screenshotCount % 2 === 0) {
                                itemDiv.classList.add('md:flex-row-reverse');
                            } else {
                                itemDiv.classList.add('md:flex-row');
                            }
                            
                            itemDiv.appendChild(imgDiv);
                            itemDiv.appendChild(textDiv);
                            
                            screenshotsContainer.appendChild(itemDiv);
                        }
                    }
                    
                    if (screenshotCount === 0) {
                        loadingPlaceholder.textContent = `No screenshots or descriptions found for ${formattedAppName}.`;
                    } else {
                        loadingPlaceholder.style.display = 'none'; // Hide loading placeholder
                        // Initialize scroll animations AFTER content is added
                        setupScrollAnimations(); 
                    }

                })
                .catch(error => {
                    console.error(`Error loading details for ${appName}:`, error);
                    appNameHeading.textContent = `Error Loading ${formattedAppName}`;
                    appTagline.textContent = 'Could not load app details. Please try again later.'
                    loadingPlaceholder.textContent = `Error: ${error.message}`;
                    screenshotsContainer.innerHTML = '';
                });
            
            // Function to setup Intersection Observer for scroll animations
            function setupScrollAnimations() {
                const animatedItems = document.querySelectorAll('.scroll-animate');
                
                const observerOptions = {
                    root: null, // relative to the viewport
                    rootMargin: '0px',
                    threshold: 0.1 // Trigger when 10% of the item is visible
                };

                const observerCallback = (entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target); // Stop observing once animated
                        }
                    });
                };

                const observer = new IntersectionObserver(observerCallback, observerOptions);
                animatedItems.forEach(item => observer.observe(item));
            }
        });
    </script>

</body>
</html>
