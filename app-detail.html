<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title will be set dynamically -->
    <title>App Details - Karmafy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic animation (reusable) */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Scroll Animation Styles */
        .scroll-animate {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .scroll-animate.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Detail Item Styles */
        .screenshot-detail-item img {
            max-height: 500px; /* Adjust as needed */
            object-fit: contain;
            border-radius: 0.75rem; /* rounded-xl */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
             background-color: #f9fafb; /* gray-50 */
             padding: 0.5rem;
        }

    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Header & Navigation (Same as other pages) -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">Karmafy</a>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="text-gray-600 hover:text-indigo-600 font-medium">Home</a></li>
                <li><a href="about.html" class="text-gray-600 hover:text-indigo-600 font-medium">About Us</a></li>
                <li><a href="contact.html" class="text-gray-600 hover:text-indigo-600 font-medium">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto px-6 py-16">
        <!-- App name will be loaded here -->
        <h1 id="app-name" class="text-4xl font-bold text-center text-indigo-600 mb-6 animate-fadeIn">App Name</h1>
        <p id="app-tagline" class="text-xl text-center text-gray-600 mb-12 animate-fadeIn" style="animation-delay: 0.1s;">Loading details...</p>
        
        <!-- Back link -->
         <div class="mb-12 text-center animate-fadeIn" style="animation-delay: 0.2s;">
            <a href="index.html#apps" class="text-indigo-600 hover:underline">&larr; Back to All Apps</a>
        </div>

        <!-- Container for Screenshots and Descriptions -->
        <div id="screenshots-container" class="space-y-16 md:space-y-24">
            <!-- Content generated by JS -->
        </div>
        
        <!-- Placeholder while loading or if app not found -->
         <div id="loading-placeholder" class="text-center py-10 text-gray-500">
             Loading app details...
         </div>

    </main>

    <!-- Footer (Same as other pages) -->
    <footer class="bg-gray-800 text-gray-300 py-8 mt-16">
        <div class="container mx-auto px-6 text-center">
            <p>&copy; 2024 Karmafy. All rights reserved.</p>
            <p class="text-sm text-gray-500 mt-2">Specializing in Native iOS App Development</p>
        </div>
    </footer>

    <!-- JavaScript for Dynamic Loading -->
    <script src="scripts/detail.js" defer></script>

</body>
</html>
